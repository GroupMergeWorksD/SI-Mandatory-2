services:
  websocket-mysql:
    image: docker.io/library/mysql:9.4
    container_name: websocket-mysql
    environment:
      MYSQL_DATABASE: equipment_reservation_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "3309:3306"
    volumes:
      - websocket-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  websocket-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: websocket-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://websocket-mysql:3306/equipment_reservation_db
      WS_MYSQL_ROOT_USER: root
      WS_MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "8085:8085"
    depends_on:
      websocket-mysql:
        condition: service_healthy

volumes:
  websocket-mysql-data:
