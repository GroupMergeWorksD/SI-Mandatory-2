spring.main.web-application-type=none

grpc.server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/equipment_reservation_db
spring.datasource.username=${GRPC_MYSQL_ROOT_USER}
spring.datasource.password=${GRPC_MYSQL_ROOT_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data/equipment_reservation_db.sql
spring.sql.init.continue-on-error=false
