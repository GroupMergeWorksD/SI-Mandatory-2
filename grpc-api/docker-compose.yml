services:
  grpc-mysql:
    image: docker.io/library/mysql:9.4
    container_name: grpc-mysql
    environment:
      MYSQL_DATABASE: equipment_reservation_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "3308:3306"
    volumes:
      - grpc-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  grpc-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grpc-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://grpc-mysql:3306/equipment_reservation_db
      GRPC_MYSQL_ROOT_USER: root
      GRPC_MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "8084:8084"
    depends_on:
      grpc-mysql:
        condition: service_healthy

volumes:
  grpc-mysql-data:
