enum TaskStatus {
    TODO
    DOING
    DONE
}

type User {
    id: ID!
    name: String!
}

type Project {
    id: ID!
    name: String!
}

type Task {
    id: ID!
    title: String!
    status: TaskStatus!
    project: Project!
    assignee: User
}

input CreateTaskInput {
    projectId: ID!
    title: String!
    assigneeId: ID
}

input CreateProjectInput {
    name: String!
}

input CreateUserInput {
    name: String!
}

type Query {
    users: [User!]!
    projects: [Project!]!
    tasks(projectId: ID!, status: TaskStatus): [Task!]!
}

type Mutation {
    createUser(input: CreateUserInput!): User!
    createProject(input: CreateProjectInput!): Project!
    createTask(input: CreateTaskInput!): Task!
    updateTaskStatus(taskId: ID!, status: TaskStatus!): Task!
}